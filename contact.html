<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get in Touch — Mozhi Collective</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+Tamil:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --color-beige: #fbf9f4;
      --color-ink: #1b201a;
      --color-ink-muted: #4e554b;
      --color-gold: #b88e4c;
      --color-gold-pale: #ebd9b4;
      --color-rust: #a14e31;
      --color-sage: #889e81;
      --color-forest: #2c362b;
      --font-serif: 'Cormorant Garamond', serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background-color: #2a3a29;
      color: var(--color-beige);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: var(--font-serif);
      overflow-x: hidden;
      position: relative;
    }

      content: '';
      position: absolute;
